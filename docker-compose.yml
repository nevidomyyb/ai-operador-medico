services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medanalysis
      POSTGRES_USER: medanalysis
      POSTGRES_PASSWORD: medanalysis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medanalysis"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://medanalysis:medanalysis@db:5432/medanalysis
      SECRET_KEY: change-me-in-production-use-openssl-rand-hex-32
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      MODEL_PATH: /app/models/best_model.pkl
      DIAGNOSES_CSV: /app/data/diagnosis_codes.csv
      PROCEDURES_CSV: /app/data/procedure_codes.csv
    volumes:
      - ./ai/models:/app/models:ro
      - ./datasets/output:/app/data:ro
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
