services:
  medanalysis-db:
    networks:
      - medanalysis
      - proxy
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medanalysis
      POSTGRES_USER: medanalysis
      POSTGRES_PASSWORD: medanalysis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medanalysis"]
      interval: 5s
      timeout: 5s
      retries: 10

  medanalysis-backend:
    networks:
        - medanalysis
        - proxy
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      medanalysis-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://medanalysis:medanalysis@medanalysis-db:5432/medanalysis
      SECRET_KEY: change-me-in-production-use-openssl-rand-hex-32
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      MODEL_PATH: /app/models/best_model.pkl
      DIAGNOSES_CSV: /app/data/diagnosis_codes.csv
      PROCEDURES_CSV: /app/data/procedure_codes.csv
    ports:
      - "8000:8000"

  medanalysis-frontend:
    networks:
      - medanalysis
      - proxy
    build: ./frontend
    depends_on:
      - medanalysis-backend
    ports:
      - "3000:80"

volumes:
  postgres_data:

networks:
  medanalysis:
    external: false
  proxy:
    external: true